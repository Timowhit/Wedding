<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Manage your wedding vendors — track contact info, categories, notes, and booking status for every vendor in one place." />
    <title>Vendors — Forever Planner</title>
    <link rel="stylesheet" href="styles/main.css" />
    <script type="module" src="scripts/vendors.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html" class="brand" aria-label="Forever Planner home">💍 Forever Planner</a>
      <a href="index.html">Dashboard</a>
      <a href="budget.html">Budget</a>
      <a href="vendors.html">Vendors</a>
      <a href="music.html">Music</a>
      <a href="inspiration.html">Inspiration</a>
      <a href="guests.html">Guests</a>
      <a href="checklist.html">Checklist</a>
    </nav>

    <header class="page-header">
      <h1><em>Vendor</em> Manager</h1>
      <p class="subtitle">Keep all your vendor contacts in one place.</p>
    </header>

    <main id="main-content">

      <!-- Add vendor form -->
      <section class="card" aria-labelledby="add-vendor-heading">
        <h2 class="card-title" id="add-vendor-heading">➕ Add Vendor</h2>

        <div class="form-row two-col">
          <div class="field-group">
            <label for="vendor-name">Vendor Name *</label>
            <input type="text" id="vendor-name" placeholder="e.g. Bloom & Blossom Florists" aria-required="true" />
          </div>
          <div class="field-group">
            <label for="vendor-category">Category</label>
            <select id="vendor-category" aria-label="Vendor category">
              <option value="Photographer">Photographer</option>
              <option value="Videographer">Videographer</option>
              <option value="Florist">Florist</option>
              <option value="Caterer">Caterer</option>
              <option value="Venue">Venue</option>
              <option value="DJ / Band">DJ / Band</option>
              <option value="Hair & Makeup">Hair &amp; Makeup</option>
              <option value="Cake">Cake</option>
              <option value="Officiant">Officiant</option>
              <option value="Transportation">Transportation</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-row two-col">
          <div class="field-group">
            <label for="vendor-phone">Phone</label>
            <input type="tel" id="vendor-phone" placeholder="(555) 000-0000" />
          </div>
          <div class="field-group">
            <label for="vendor-email">Email</label>
            <input type="email" id="vendor-email" placeholder="hello@vendor.com" />
          </div>
        </div>

        <div class="form-row two-col">
          <div class="field-group">
            <label for="vendor-website">Website</label>
            <input type="url" id="vendor-website" placeholder="https://vendor.com" />
          </div>
          <div class="field-group">
            <label for="vendor-status">Booking Status</label>
            <select id="vendor-status" aria-label="Booking status">
              <option value="Researching">Researching</option>
              <option value="Contacted">Contacted</option>
              <option value="Booked">Booked ✓</option>
              <option value="Declined">Declined</option>
            </select>
          </div>
        </div>

        <div class="field-group" style="margin-bottom:12px;">
          <label for="vendor-notes">Notes</label>
          <textarea id="vendor-notes" placeholder="Deposit paid, contract signed…"></textarea>
        </div>

        <button class="btn btn-primary btn-full" id="add-vendor-btn">Add Vendor</button>
      </section>

      <!-- Filter tabs -->
      <div class="filter-tabs" role="group" aria-label="Filter vendors by status">
        <button class="filter-tab active" data-status="All">All</button>
        <button class="filter-tab" data-status="Researching">Researching</button>
        <button class="filter-tab" data-status="Contacted">Contacted</button>
        <button class="filter-tab" data-status="Booked">Booked</button>
      </div>

      <!-- Vendor list -->
      <section aria-label="Vendor list">
        <ul class="item-list" id="vendor-list" aria-label="Vendors"></ul>
        <div class="empty-state" id="vendor-empty" hidden>
          <span class="empty-icon" aria-hidden="true">🎪</span>
          <p>No vendors added yet. Fill in the form above to get started!</p>
        </div>
      </section>

    </main>
  </body>
</html>
