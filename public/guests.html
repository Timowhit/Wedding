<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guests — Forever Planner</title>
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/lang-switcher.css" />
    <script type="module" src="scripts/guests.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html" class="brand">💍 Forever Planner</a>
      <a href="index.html">Dashboard</a><a href="budget.html">Budget</a>
      <a href="vendors.html">Vendors</a><a href="music.html">Music</a>
      <a href="inspiration.html">Inspiration</a><a href="guests.html">Guests</a>
      <a href="checklist.html">Checklist</a><a href="settings.html">Settings</a>
      <button id="logout-btn" class="btn btn-ghost nav-logout">Sign Out</button>
      <span class="nav-user-group"
        ><span id="nav-user" class="nav-user-name"></span
      ></span>
    </nav>
    <header class="page-header">
      <h1 data-i18n="guests.title" data-i18n-html><em>Guest</em> List</h1>
      <p class="subtitle" data-i18n="guests.subtitle">
        Track RSVPs, dietary needs, and plus-ones.
      </p>
    </header>
    <main id="main-content">
      <section aria-label="Guest summary">
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-icon">👥</span>
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label" data-i18n="guests.total">Total</div>
          </div>
          <div class="stat-card">
            <span class="stat-icon">✅</span>
            <div class="stat-value" id="stat-confirmed">0</div>
            <div class="stat-label" data-i18n="guests.confirmed">Confirmed</div>
          </div>
          <div class="stat-card">
            <span class="stat-icon">⏳</span>
            <div class="stat-value" id="stat-pending">0</div>
            <div class="stat-label" data-i18n="guests.pending">Pending</div>
          </div>
          <div class="stat-card">
            <span class="stat-icon">❌</span>
            <div class="stat-value" id="stat-declined">0</div>
            <div class="stat-label" data-i18n="guests.declined">Declined</div>
          </div>
        </div>
      </section>
      <section class="card" aria-labelledby="add-guest-heading">
        <h2
          class="card-title"
          id="add-guest-heading"
          data-i18n="guests.addGuest"
        >
          ➕ Add Guest
        </h2>
        <div class="form-row two-col">
          <div class="field-group">
            <label for="guest-name" data-i18n="guests.fullName"
              >Full Name *</label
            >
            <input
              type="text"
              id="guest-name"
              data-i18n="guests.fullNamePlaceholder"
              data-i18n-attr="placeholder"
              placeholder="e.g. Jane Smith"
              aria-required="true"
            />
          </div>
          <div class="field-group">
            <label for="guest-rsvp" data-i18n="guests.rsvpStatus"
              >RSVP Status</label
            >
            <select id="guest-rsvp">
              <option value="Pending">Pending</option>
              <option value="Confirmed">Confirmed</option>
              <option value="Declined">Declined</option>
            </select>
          </div>
        </div>
        <div class="form-row two-col">
          <div class="field-group">
            <label for="guest-diet" data-i18n="guests.dietary"
              >Dietary Requirements</label
            >
            <input
              type="text"
              id="guest-diet"
              data-i18n="guests.dietaryPlaceholder"
              data-i18n-attr="placeholder"
              placeholder="e.g. Vegan, Gluten-free"
            />
          </div>
          <div class="field-group">
            <label for="guest-plusone" data-i18n="guests.plusOne"
              >Plus-One Name</label
            >
            <input
              type="text"
              id="guest-plusone"
              data-i18n="guests.plusOnePlaceholder"
              data-i18n-attr="placeholder"
              placeholder="e.g. John Smith"
            />
          </div>
        </div>
        <button
          class="btn btn-primary btn-full"
          id="add-guest-btn"
          data-i18n="guests.addGuestBtn"
        >
          Add Guest
        </button>
      </section>
      <div
        class="filter-tabs"
        role="group"
        aria-label="Filter guests by RSVP status"
      >
        <button
          class="filter-tab active"
          data-rsvp="All"
          data-i18n="common.all"
        >
          All
        </button>
        <button
          class="filter-tab"
          data-rsvp="Confirmed"
          data-i18n="guests.confirmed"
        >
          Confirmed
        </button>
        <button
          class="filter-tab"
          data-rsvp="Pending"
          data-i18n="guests.pending"
        >
          Pending
        </button>
        <button
          class="filter-tab"
          data-rsvp="Declined"
          data-i18n="guests.declined"
        >
          Declined
        </button>
      </div>
      <section aria-label="Guest list">
        <ul class="item-list" id="guest-list"></ul>
        <div class="empty-state" id="guest-empty" hidden>
          <span class="empty-icon">💌</span>
          <p data-i18n="guests.empty">
            No guests added yet. Add your first guest above!
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
