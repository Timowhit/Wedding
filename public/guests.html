<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Manage your wedding guest list — track RSVPs, dietary requirements, and plus-ones all in one place."
    />
    <title>Guests — Forever Planner</title>
    <link rel="stylesheet" href="styles/main.css" />
    <script type="module" src="scripts/guests.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html" class="brand" aria-label="Forever Planner home"
        >💍 Forever Planner</a
      >
      <a href="index.html">Dashboard</a>
      <a href="budget.html">Budget</a>
      <a href="vendors.html">Vendors</a>
      <a href="music.html">Music</a>
      <a href="inspiration.html">Inspiration</a>
      <a href="guests.html">Guests</a>
      <a href="checklist.html">Checklist</a>
      <a href="settings.html">Settings</a>
      <span class="nav-user-group">
        <span id="nav-user" class="nav-user-name"></span>
        <button id="logout-btn" class="btn btn-ghost nav-logout">
          Sign Out
        </button>
      </span>
    </nav>

    <header class="page-header">
      <h1><em>Guest</em> List</h1>
      <p class="subtitle">Track RSVPs, dietary needs, and plus-ones.</p>
    </header>

    <main id="main-content">
      <!-- Summary stats -->
      <section aria-label="Guest summary">
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-icon" aria-hidden="true">👥</span>
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat-card">
            <span class="stat-icon" aria-hidden="true">✅</span>
            <div class="stat-value" id="stat-confirmed">0</div>
            <div class="stat-label">Confirmed</div>
          </div>
          <div class="stat-card">
            <span class="stat-icon" aria-hidden="true">⏳</span>
            <div class="stat-value" id="stat-pending">0</div>
            <div class="stat-label">Pending</div>
          </div>
          <div class="stat-card">
            <span class="stat-icon" aria-hidden="true">❌</span>
            <div class="stat-value" id="stat-declined">0</div>
            <div class="stat-label">Declined</div>
          </div>
        </div>
      </section>

      <!-- Add guest form -->
      <section class="card" aria-labelledby="add-guest-heading">
        <h2 class="card-title" id="add-guest-heading">➕ Add Guest</h2>

        <div class="form-row two-col">
          <div class="field-group">
            <label for="guest-name">Full Name *</label>
            <input
              type="text"
              id="guest-name"
              placeholder="e.g. Jane Smith"
              aria-required="true"
            />
          </div>
          <div class="field-group">
            <label for="guest-rsvp">RSVP Status</label>
            <select id="guest-rsvp" aria-label="RSVP status">
              <option value="Pending">Pending</option>
              <option value="Confirmed">Confirmed</option>
              <option value="Declined">Declined</option>
            </select>
          </div>
        </div>

        <div class="form-row two-col">
          <div class="field-group">
            <label for="guest-diet">Dietary Requirements</label>
            <input
              type="text"
              id="guest-diet"
              placeholder="e.g. Vegan, Gluten-free"
            />
          </div>
          <div class="field-group">
            <label for="guest-plusone">Plus-One Name</label>
            <input
              type="text"
              id="guest-plusone"
              placeholder="e.g. John Smith"
            />
          </div>
        </div>

        <button class="btn btn-primary btn-full" id="add-guest-btn">
          Add Guest
        </button>
      </section>

      <!-- Filter tabs -->
      <div
        class="filter-tabs"
        role="group"
        aria-label="Filter guests by RSVP status"
      >
        <button class="filter-tab active" data-rsvp="All">All</button>
        <button class="filter-tab" data-rsvp="Confirmed">Confirmed</button>
        <button class="filter-tab" data-rsvp="Pending">Pending</button>
        <button class="filter-tab" data-rsvp="Declined">Declined</button>
      </div>

      <!-- Guest list -->
      <section aria-label="Guest list">
        <ul class="item-list" id="guest-list" aria-label="Guests"></ul>
        <div class="empty-state" id="guest-empty" hidden>
          <span class="empty-icon" aria-hidden="true">💌</span>
          <p>No guests added yet. Add your first guest above!</p>
        </div>
      </section>
    </main>
  </body>
</html>
