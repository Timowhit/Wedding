<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Sign in or create your Forever Planner account."
    />
    <title>Sign In — Forever Planner</title>
    <link rel="stylesheet" href="styles/main.css" />
    <script type="module" src="scripts/login.js"></script>
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .auth-shell {
        width: 100%;
        max-width: 420px;
        padding: 24px 20px 48px;
        animation: fadeUp 0.5s ease both;
      }

      .auth-brand {
        text-align: center;
        margin-bottom: 32px;
      }
      .auth-brand .logo {
        font-family: "Cormorant Garamond", serif;
        font-size: 2rem;
        font-weight: 300;
        color: var(--primary);
        letter-spacing: 3px;
        display: block;
      }
      .auth-brand .tagline {
        font-size: 0.8rem;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 4px;
      }

      .auth-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        overflow: hidden;
        margin-bottom: 24px;
      }
      .auth-tab {
        padding: 10px;
        text-align: center;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        background: var(--surface);
        border: none;
        transition: all var(--transition);
      }
      .auth-tab.active {
        background: var(--primary);
        color: #fff;
      }

      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .auth-form[hidden] {
        display: none;
      }
      .auth-submit {
        margin-top: 4px;
      }

      /* Google button */
      .btn-google {
        background: #fff;
        color: #3c4043;
        border: 1px solid #dadce0;
        justify-content: center;
        gap: 10px;
        font-size: 0.9rem;
        transition: background 0.2s;
      }
      .btn-google:hover {
        background: #f8f9fa;
        transform: none;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
      }
      .btn-google img {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      .auth-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-muted);
        font-size: 0.75rem;
        margin: 4px 0;
      }
      .auth-divider::before,
      .auth-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .field-error {
        font-size: 0.75rem;
        color: var(--danger);
        margin-top: 2px;
        display: none;
      }
      .field-error.visible {
        display: block;
      }
      .btn .spinner {
        width: 14px;
        height: 14px;
        border-width: 2px;
        margin-right: 4px;
      }

      @media (max-width: 480px) {
        .auth-shell {
          padding: 16px 16px 40px;
        }
      }
    </style>
  </head>
  <body>
    <main class="auth-shell" id="main-content">
      <div class="auth-brand">
        <span class="logo">💍 Forever Planner</span>
        <span class="tagline">Your wedding, beautifully organised</span>
      </div>

      <!-- Tab switcher -->
      <div
        class="auth-tabs"
        role="tablist"
        aria-label="Sign in or create account"
      >
        <button
          class="auth-tab active"
          role="tab"
          aria-selected="true"
          aria-controls="login-form"
          id="tab-login"
        >
          Sign In
        </button>
        <button
          class="auth-tab"
          role="tab"
          aria-selected="false"
          aria-controls="register-form"
          id="tab-register"
        >
          Create Account
        </button>
      </div>

      <!-- Login form -->
      <form
        class="auth-form card"
        id="login-form"
        role="tabpanel"
        aria-labelledby="tab-login"
        novalidate
      >
        <!-- Google Sign In -->
        <a href="/api/v1/auth/google" class="btn btn-google btn-full">
          <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
            alt=""
          />
          Continue with Google
        </a>

        <div class="auth-divider">or</div>

        <div class="field-group">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            autocomplete="email"
            placeholder="email@example.com"
            required
          />
          <span class="field-error" id="login-email-error"></span>
        </div>
        <div class="field-group">
          <label for="login-password">Password</label>
          <input
            type="password"
            id="login-password"
            autocomplete="current-password"
            placeholder="••••••••••••"
            required
          />
          <span class="field-error" id="login-password-error"></span>
        </div>

        <div
          id="login-error-banner"
          hidden
          role="alert"
          style="
            background: #fde8e8;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
          "
        >
          <span
            id="login-error-msg"
            style="color: var(--danger); font-size: 0.85rem"
          ></span>
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-full auth-submit"
          id="login-btn"
        >
          Sign In
        </button>
      </form>

      <!-- Register form -->
      <form
        class="auth-form card"
        id="register-form"
        role="tabpanel"
        aria-labelledby="tab-register"
        hidden
        novalidate
      >
        <!-- Google Sign Up -->
        <a href="/api/v1/auth/google" class="btn btn-google btn-full">
          <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
            alt=""
          />
          Sign up with Google
        </a>

        <div class="auth-divider">or</div>

        <div class="field-group">
          <label for="reg-name"
            >Your Name
            <span style="color: var(--text-muted)">(optional)</span></label
          >
          <input
            type="text"
            id="reg-name"
            autocomplete="name"
            placeholder="e.g. Jane &amp; Tom"
            maxlength="80"
          />
        </div>
        <div class="field-group">
          <label for="reg-email">Email</label>
          <input
            type="email"
            id="reg-email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
          <span class="field-error" id="reg-email-error"></span>
        </div>
        <div class="field-group">
          <label for="reg-password">Password</label>
          <input
            type="password"
            id="reg-password"
            autocomplete="new-password"
            placeholder="Min 8 chars, 1 uppercase, 1 number"
            required
          />
          <span class="field-error" id="reg-password-error"></span>
        </div>
        <div class="field-group">
          <label for="reg-confirm">Confirm Password</label>
          <input
            type="password"
            id="reg-confirm"
            autocomplete="new-password"
            placeholder="Repeat password"
            required
          />
          <span class="field-error" id="reg-confirm-error"></span>
        </div>

        <div
          class="field-group"
          id="reg-error-banner"
          hidden
          role="alert"
          style="
            background: #fde8e8;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
          "
        >
          <span
            id="reg-error-msg"
            style="color: var(--danger); font-size: 0.85rem"
          ></span>
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-full auth-submit"
          id="reg-btn"
        >
          Create Account
        </button>
      </form>
    </main>
  </body>
</html>
