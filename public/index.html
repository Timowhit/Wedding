<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard — Forever Planner</title>
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/lang-switcher.css" />
    <script type="module" src="scripts/dashboard.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html" class="brand" aria-label="Forever Planner home"
        >💍 Forever Planner</a
      >
      <a href="index.html">Dashboard</a>
      <a href="budget.html">Budget</a>
      <a href="vendors.html">Vendors</a>
      <a href="music.html">Music</a>
      <a href="inspiration.html">Inspiration</a>
      <a href="guests.html">Guests</a>
      <a href="checklist.html">Checklist</a>
      <a href="settings.html">Settings</a>
      <button id="logout-btn" class="btn btn-ghost nav-logout">Sign Out</button>
      <span class="nav-user-group"
        ><span id="nav-user" class="nav-user-name"></span
      ></span>
    </nav>
    <header class="page-header">
      <h1 data-i18n="dashboard.title" data-i18n-html>
        <em>Our</em> Wedding Dashboard
      </h1>
      <p class="subtitle" data-i18n="dashboard.subtitle">
        Everything you need, all in one place.
      </p>
    </header>
    <main id="main-content">
      <section class="card" aria-labelledby="countdown-heading">
        <div class="countdown-block">
          <span
            id="countdown-number"
            class="countdown-number"
            aria-live="polite"
            >—</span
          >
          <p class="countdown-label" data-i18n="dashboard.daysUntil">
            Days Until Your Wedding
          </p>
          <p id="countdown-date-label" class="countdown-date-label"></p>
        </div>
        <div class="date-setter">
          <label for="wedding-date-input" data-i18n="dashboard.setDate"
            >Set your wedding date:</label
          >
          <input
            type="date"
            id="wedding-date-input"
            aria-label="Wedding date"
          />
          <button
            class="btn btn-primary"
            id="set-date-btn"
            data-i18n="dashboard.saveDate"
          >
            Save Date
          </button>
        </div>
      </section>
      <section aria-label="Planning summary">
        <div class="stats-grid">
          <a
            href="budget.html"
            class="stat-card delay-1 stat-card-link"
            role="region"
            aria-label="Budget stat"
          >
            <span class="stat-icon" aria-hidden="true">💰</span>
            <div class="stat-value" id="stat-budget">$0</div>
            <div class="stat-label" data-i18n="dashboard.budgetSpent">
              Budget Spent
            </div>
          </a>
          <a
            href="guests.html"
            class="stat-card delay-2 stat-card-link"
            role="region"
            aria-label="Guest stat"
          >
            <span class="stat-icon" aria-hidden="true">👥</span>
            <div class="stat-value" id="stat-guests">0</div>
            <div class="stat-label" data-i18n="dashboard.guests">Guests</div>
          </a>
          <a
            href="checklist.html"
            class="stat-card delay-3 stat-card-link"
            role="region"
            aria-label="Tasks stat"
          >
            <span class="stat-icon" aria-hidden="true">📋</span>
            <div class="stat-value" id="stat-tasks">0%</div>
            <div class="stat-label" data-i18n="dashboard.tasksDone">
              Tasks Done
            </div>
          </a>
          <a
            href="vendors.html"
            class="stat-card delay-4 stat-card-link"
            role="region"
            aria-label="Vendors stat"
          >
            <span class="stat-icon" aria-hidden="true">🎪</span>
            <div class="stat-value" id="stat-vendors">0</div>
            <div class="stat-label" data-i18n="dashboard.vendors">Vendors</div>
          </a>
          <a
            href="music.html"
            class="stat-card stat-card-link"
            role="region"
            aria-label="Go to music planner"
          >
            <span class="stat-icon" aria-hidden="true">🎵</span>
            <div class="stat-label" data-i18n="dashboard.music">Music</div>
          </a>
          <a
            href="inspiration.html"
            class="stat-card stat-card-link"
            role="region"
            aria-label="Go to inspiration board"
          >
            <span class="stat-icon" aria-hidden="true">🌸</span>
            <div class="stat-label" data-i18n="dashboard.inspiration">
              Inspiration
            </div>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
