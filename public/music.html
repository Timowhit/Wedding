<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Music — Forever Planner</title>
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/lang-switcher.css" />
    <script type="module" src="scripts/music.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html" class="brand">💍 Forever Planner</a>
      <a href="index.html">Dashboard</a><a href="budget.html">Budget</a>
      <a href="vendors.html">Vendors</a><a href="music.html">Music</a>
      <a href="inspiration.html">Inspiration</a><a href="guests.html">Guests</a>
      <a href="checklist.html">Checklist</a><a href="settings.html">Settings</a>
      <button id="logout-btn" class="btn btn-ghost nav-logout">Sign Out</button>
      <span class="nav-user-group"
        ><span id="nav-user" class="nav-user-name"></span
      ></span>
    </nav>
    <header class="page-header">
      <h1 data-i18n="music.title" data-i18n-html><em>Music</em> Planner</h1>
      <p class="subtitle" data-i18n="music.subtitle">
        Search songs and build your wedding playlists.
      </p>
    </header>
    <main id="main-content">
      <section class="card" aria-labelledby="music-search-heading">
        <h2
          class="card-title"
          id="music-search-heading"
          data-i18n="music.searchSongs"
        >
          🔍 Search Songs
        </h2>
        <div class="search-row">
          <input
            type="text"
            id="music-search-input"
            data-i18n="music.searchPlaceholder"
            data-i18n-attr="placeholder"
            placeholder="Search by song or artist…"
            aria-label="Search songs or artists"
          />
          <select
            id="music-section-select"
            class="music-section-select"
            aria-label="Add to playlist section"
          >
            <option value="Processional">Processional</option>
            <option value="Ceremony">Ceremony</option>
            <option value="Cocktail Hour">Cocktail Hour</option>
            <option value="First Dance">First Dance</option>
            <option value="Reception">Reception</option>
            <option value="Last Dance">Last Dance</option>
          </select>
          <button
            class="btn btn-primary"
            id="music-search-btn"
            data-i18n="common.search"
          >
            Search
          </button>
        </div>
        <div id="music-results" aria-live="polite"></div>
      </section>
      <section aria-labelledby="playlist-heading">
        <h2
          class="card-title playlist-heading"
          id="playlist-heading"
          data-i18n="music.yourPlaylists"
        >
          🎶 Your Playlists
        </h2>
        <div id="playlist-container"></div>
        <div class="empty-state" id="playlist-empty" hidden>
          <span class="empty-icon">🎵</span>
          <p data-i18n="music.empty">
            Your playlist is empty. Search for songs above and add them!
          </p>
        </div>
      </section>
    </main>
    <style>
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </body>
</html>
